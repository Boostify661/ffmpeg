
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الفيديو الذكي | FFmpeg WASM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>معالج الفيديو المتطور <small>بواسطة FFmpeg</small></h1>
        
        <div class="upload-section">
            <input type="file" id="uploader" accept="video/*">
            <p>اختر ملف فيديو للبدء</p>
        </div>

        <div class="controls">
            <select id="format">
                <option value="mp4">تحويل إلى MP4</option>
                <option value="avi">تحويل إلى AVI</option>
                <option value="mov">تحويل إلى MOV</option>
                <option value="mp3">استخراج الصوت (MP3)</option>
            </select>
            <button id="startBtn">بدء المعالجة</button>
        </div>

        <div class="status">
            <p id="message">انتظار رفع الملف...</p>
            <div class="progress-bar"><div id="progress"></div></div>
        </div>

        <video id="player" controls></video>
    </div>

    <!-- تحميل مكتبة FFmpeg.wasm من مصدر خارجي -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
